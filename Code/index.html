<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    
    body {
      background-color: #1c1c1c;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background-color: #2b2b2b;
      padding: 30px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo img {
      max-width: 100px;
    }
    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 20px;
    }
    input {
      background-color: #3b3b3b;
      color: #fff;
      border: none;
    }
    .btn-primary {
      background-color: #ffd300;
      border-color: #ffd300;
      color: #000;
      font-weight: bold;
    }
    .btn-primary:hover {
      background-color: #e6ba00;
      border-color: #e6ba00;
    }
    a {
      color: #ffd300;
    }
    .PageIntro {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%; /* Ensure it covers full height */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    header {
      background-color: #fff;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .header img {
      max-width: 150px;
    }
    .content {
      max-width: 800px;
      width: 100%;
      margin: 20px auto;
      padding: 10px;
      background-color: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .student-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      margin-left: 50px;
      margin-right: 30px;
    }
    .start-button {
      display: block;
      background-color: #00b300;
      color: #fff;
      text-align: center;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 16px;
      margin-top: 20px;
    }
    .start-button {
      background-color: #009900;
      font-size: 18px;
    }
    p{
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container" id="PageLogin" style="display:block;">
    <div class="logo">
      <img src="img/logo.jpg" alt="UTE Logo">
    </div>
    <h1>Login</h1>
    <div class="form-group">
      <input type="text" id="ssid" class="form-control" placeholder="User" />
    </div>
    <div class="form-group">
      <input type="password" id="password" class="form-control" placeholder="Password" />
    </div>
    <button class="btn btn-primary btn-block" onclick="checkPassword()">Login</button>
    <div class="text-center mt-3">
      <a href="#">Forgot password?</a>
    </div>
    <div class="text-center mt-3">
      <a href="#">Create a new account</a>
    </div>
  </div>
    <!-- Modal Thông báo Mật khẩu Đúng -->
    <div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body text-center">
            <p id="successModaltext">Login Successful!</p>
          </div>
        </div>
      </div>
    </div>
      <!-- Modal Thông báo Mật khẩu Sai -->
  <div class="modal fade" id="wrongPasswordModal" tabindex="-1" aria-labelledby="wrongPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center">
          <p>Login Fail. Please try again!</p>
        </div>
      </div>
    </div>
  </div>
  <div id="PageIntroduction" class="PageIntro" style="display:none;">
    <header>
      <img src="img/logo_hcmute_feee.png" alt="HCMUTE Logo">
      <!-- <div class="h1">Robot Design</div> -->
    </header>
    <div class="content">
      <Center>
        <h2><b>THIẾT KẾ MÔ HÌNH VÀ ĐIỀU KHIỂN CÁNH TAY ROBOT 4 BẬC TỰ DO</b></h2>
        <h3><b>Môn: Thực tập kỹ thuật Robot</b></h3>
      </Center>
      <div class="student-info">
        <div>
          <h4><b>Giáo viên hướng dẫn:</b></h4>
          <p>TS. Nguyễn Văn Thái<br/><br/>
          <img src="img/d1.jpg" alt="Giảng viên hướng dẫn">
        </div>
        <div>
          <h4><b>Sinh viên thực hiện:</b></h4>
          <p>Vũ Tiến Phát - 21151309</p>
          <img src="img/robot.jpg" alt="Giảng viên hướng dẫn">
        </div>
      </div>
      <a class="start-button" id="buttonstart"><b>START</b></a>
    </div>
  </div>
</body>
<script src="./lib.js"></script>
<script src="./main.js"></script>
<script src="./Login.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</html>
